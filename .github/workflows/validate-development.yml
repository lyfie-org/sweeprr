name: Validate Development Branch

on:
  push:
    branches:
      - development

jobs:
  validate-client:
    name: Validate React Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Client
        run: pnpm --filter sweeprr-client build

      - name: Run Client Tests
        run: pnpm --filter sweeprr-client test

  validate-api:
    name: Validate .NET API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up .NET Core SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build API & Tests
        run: dotnet build --no-restore

      - name: Run .NET Tests
        run: dotnet test --no-build --verbosity normal
