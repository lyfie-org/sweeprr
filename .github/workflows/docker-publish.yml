name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version Bump Type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    name: Build, Test, Tag, and Push
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Next Version
        id: versioning
        run: |
          # Find the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Current latest tag: $LATEST_TAG"
          
          # Remove the 'v' prefix
          VERSION=${LATEST_TAG#v}
          
          # Split into Major, Minor, Patch array
          IFS='.' read -r -a PARTS <<< "$VERSION"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}
          
          # Calculate new version based on UI input
          BUMP_TYPE="${{ github.event.inputs.bump }}"
          if [ "$BUMP_TYPE" == "major" ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [ "$BUMP_TYPE" == "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          
          NEW_TAG="v$MAJOR.$MINOR.$PATCH"
          echo "Calculated new tag: $NEW_TAG"
          
          # Save to environment variables for later steps
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 1. BUILD & RUN SMOKE TEST ──────────────────────────────────────────
      - name: Build local image for Smoke Test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: sweeprr-smoketest:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Smoke Test
        run: |
          docker run -d -p 8080:8080 --name smoke-test sweeprr-smoketest:latest
          
          echo "Waiting 10 seconds for container to initialize..."
          sleep 10
          
          if [ "$(docker inspect -f '{{.State.Status}}' smoke-test)" != "running" ]; then
            echo "❌ Container crashed on boot! Logs:"
            docker logs smoke-test
            exit 1
          fi
          
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || echo "Failed")
          
          if [ "$HTTP_STATUS" != "200" ] && [ "$HTTP_STATUS" != "428" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS"
            docker logs smoke-test
            exit 1
          fi
          
          echo "✅ Smoke test passed perfectly (Status: $HTTP_STATUS)! Proceeding with release..."

      # ─── 2. TAG AND PUSH DOCKER IMAGE ───────────────────────────────────────
      - name: Push new Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ env.NEW_TAG }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── 3. SYNC development BRANCH ─────────────────────────────────────────────────
      - name: Sync main back to development
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Syncing main branch back to development branch..."
          
          git fetch origin main development
          
          git checkout development
          
          git merge origin/main --no-edit
          
          git push origin development
          
          echo "✅ development branch successfully synced with main!"
